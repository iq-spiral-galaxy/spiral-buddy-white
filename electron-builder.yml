appId: com.iq-lab.spiral-buddy-white
productName: Spiral Buddy White
copyright: © 2026 iq-lab

# v0.5.95 — macOS Helper 앱을 CFBundleName("Spiral Buddy Blue")에 맞춰 rename.
# dock 호버 이름은 CFBundleName을 읽으므로 Blue로 띄우려면 CFBundleName을
# 바꿔야 하는데, 그러면 Electron이 Helper를 못 찾아 크래시 → 이 훅이 Helper를
# 같은 이름으로 rename해 일치시킨다. (자세한 배경: electron/after-pack.cjs)
afterPack: ./electron/after-pack.cjs

# 안전한 기본값: asar 끔. 자식 프로세스에서 dist/server.js를 process.execPath로 실행하므로
# unpack 처리 신경 안 써도 됨. 사이즈 약간 늘지만 안정성 우선.
asar: false

directories:
  output: release
  buildResources: electron/build

# 패키징할 파일 목록
files:
  - electron/**/*
  - dist/**/*
  - client/**/*
  - data/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/tsconfig*.json"
  - "!.env*"
  - "!.claude/**"
  - "!docs/**"
  - "!scripts/**"
  - "!electron/after-pack.cjs" # 빌드 훅 — 앱 번들에 포함 불필요

# extraResources에 둘 것 없음 — 모두 files에 포함

mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Apple Developer ID 없이 ad-hoc 서명 ("-"). identity: null은 서명을 완전히 끄는 것이고
  # 그 경우 macOS Sequoia에서 즉시 "손상됨" 표시. ad-hoc은 일부 환경에서 우회됨.
  # 그래도 안 되면 사용자는 README 안내대로 `xattr -cr` 실행 필요.
  identity: "-"
  hardenedRuntime: false
  gatekeeperAssess: false
  # dock 호버 이름은 CFBundleName을 읽는다(CFBundleDisplayName/.app 파일명 아님 —
  # v0.5.92↔v0.5.94 대조로 확정). 따라서 "Spiral Buddy Blue"로 띄우려면
  # CFBundleName을 바꿔야 한다.
  #
  # ⚠ CFBundleName을 바꾸면 Electron이 Helper를 "<CFBundleName> Helper.app"로
  # 찾다가 실패해 크래시한다(v0.5.92→93의 EXC_BREAKPOINT 원인). 그래서
  # afterPack 훅(electron/after-pack.cjs)이 Helper 앱들을 같은 이름으로 rename해
  # 일치시킨다. CFBundleName과 afterPack은 항상 같이 가야 한다.
  # productName/.app 파일명은 그대로라 자동 업데이트는 유지된다.
  extendInfo:
    CFBundleName: Spiral Buddy White
    CFBundleDisplayName: Spiral Buddy Blue

dmg:
  title: Spiral Buddy ${version}
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch:
        - x64
  # code signing 없이 빌드 — Windows Defender SmartScreen 경고 뜸 (사용자 무시 가능)

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  # v0.5.92 — 시작메뉴/바탕화면 바로가기 표시명 (설치 경로는 불변)
  shortcutName: Spiral Buddy Blue

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Education

# GitHub Releases 발행 (CI에서 환경변수 GH_TOKEN 사용)
# v0.5.87 — iq-spiral-galaxy/spiral-buddy-blue로 이전
publish:
  provider: github
  owner: iq-spiral-galaxy
  repo: spiral-buddy-blue
  releaseType: release
