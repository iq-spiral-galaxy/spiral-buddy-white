name: CLA Assistant

# CLA Assistant Lite — 외부 서비스/App 없이 서명을 이 레포의 'cla-signatures'
# 브랜치(signatures/version1/cla.json)에 저장. 기여자가 PR을 열면 봇이 CLA 서명을
# 요청하고, 지정 문구로 코멘트하면 서명·타임스탬프·동의한 CLA 버전이 기록됨.
#
# DCO(dco.yml)와 역할 분담:
#   · DCO       = 커밋별 출처 자기 인증 (Signed-off-by)
#   · CLA(이 봇) = CLA 전문에 대한 명시적 서명 기록 (재라이선스·특허·지분 조항 동의)
#
# release.yml과 무간섭. 서명 저장에는 기본 GITHUB_TOKEN만 사용(별도 PAT 불필요).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write        # cla-signatures 브랜치에 서명 파일 커밋
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    # 서명/recheck 코멘트이거나 PR 이벤트일 때만 실행 (sign 문구는 아래 with와 일치)
    if: >-
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'CLA 문서를 읽었으며 이에 동의하고 서명합니다') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant Lite
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/iq-spiral-galaxy/spiral-buddy-blue/blob/main/CLA.md
          branch: cla-signatures
          # 소유자·봇 계정은 서명 면제 (*[bot] = dependabot[bot]·github-actions[bot] 등)
          allowlist: e9ua1,*[bot]
          lock-pullrequest-aftermerge: false
          # 기여자가 서명을 위해 코멘트할 문구 (위 if 조건과 반드시 일치)
          custom-pr-sign-comment: CLA 문서를 읽었으며 이에 동의하고 서명합니다
          custom-notsigned-prcomment: >-
            기여 감사합니다! 머지 전에 [기여자 라이선스 동의서(CLA)](https://github.com/iq-spiral-galaxy/spiral-buddy-blue/blob/main/CLA.md)에
            서명이 필요합니다. CLA를 읽으신 뒤, **아래 문구를 그대로 이 PR에 코멘트**해주세요
            (서명·시각이 기록되며, 이후 PR엔 자동 적용됩니다). 아직 서명하지 않은 분:
          custom-allsigned-prcomment: >-
            ✅ 모든 기여자가 CLA에 서명했습니다. 감사합니다!
